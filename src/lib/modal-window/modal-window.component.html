<div class="modal-backdrop-layer" (mousedown)="onWindowClick()">
  <!-- We catch mousedown on the container to prevent closing or losing focus inappropriately, 
       but we let events pass through the backdrop to the container. -->
  <div class="window-container card shadow" 
       (mousedown)="$event.stopPropagation(); onWindowClick()"
       [style.width.vw]="width" 
       [style.height.vh]="height">
    
    <lib-virtual-scrollbar class="card-body p-0 position-relative" 
                           [scrollIcon]="scrollIcon" 
                           [scrollThumbSize]="scrollThumbSize">
      <ng-template [cdkPortalOutlet]="contentPortal" (attached)="onPortalAttached($event)"></ng-template>
      <ng-content></ng-content>
    </lib-virtual-scrollbar>

  </div>
</div>
